      "intro.p1": "大语言模型在过去几年重塑了人机交互的方式，但一个根本问题始终没有得到解决：幻觉（Hallucination）。模型会以高度自信的语气生成看似合理、实则错误的内容，而用户几乎没有可靠的手段来判断一个回答是否值得信任。你问了一个问题，得到了一个听起来很有道理的答案——但它是真的吗？",
      "intro.p2": "与此同时，另一个问题同样被忽视：企业级 LLM 服务——例如 AWS Bedrock、火山引擎方舟——拥有强大的模型能力，却长期缺乏面向普通用户的成熟客户端。这类服务的访问方式以 API 调用为主，技术门槛将大多数潜在用户拒之门外。",

    en: {

      "nav.faq": "FAQ",

      "post.meta": "Guide · March 19, 2026",
      "post.title": "Getting Started with tera (tt): A Multi-Model AI Assistant",
      "post.lead": "tera is a native multi-model AI client for iPhone, iPad, and Mac that lets you query multiple LLMs at once and receive a single, synthesized answer.",
      "intro.p1": "Large language models have transformed how people interact with information, but one fundamental problem remains stubbornly unsolved: hallucination. Models generate plausible-sounding answers with apparent confidence, and users have no reliable way to know whether what they're reading is actually true. You ask a question, you get a well-written answer — but is it right?",
      "intro.p2": "A separate but equally overlooked problem: powerful enterprise LLM services — AWS Bedrock, VolcEngine Ark, and others — have long lacked a polished end-user client. They're API-first by design, built for developers, and that technical barrier has kept most people from using them directly.",
      "intro.p3": "tera addresses both. It dispatches the same question to multiple independent LLMs simultaneously — OpenAI, Anthropic, AWS Bedrock, DeepSeek, and more — and collects their responses in parallel. Where models agree, confidence is higher. Where they diverge, the disagreement itself is worth examining. tera then sends all responses to a designated summarizer model, which synthesizes them into a single, well-rounded final answer.",
      "s1.title": "Why Does This App Have Two Names?",
      "s1.p1": "The app's official name is tera, developed by teramoby — full name teramoby tera. In practice it's often shortened to tt, from the initials of teramoby tera. Both names refer to the same app; tt is just the everyday shorthand.",
      "s1.p2": "On the App Store, the app is listed as tera. Search for teramoby — the developer name — to find it reliably, since tera alone is a common word that may surface unrelated results.",
      "s2.title": "Installation",
      "s2.p1": "Search for teramoby on the App Store, download tera for free, and open it. On first launch you'll see a privacy disclosure — read it and tap to continue.",

      "step3.title": "Read each model's response",
      "step3.desc": "Responses come back simultaneously. You can read each model's full answer individually.",

      "footer.home": "Help Center",
      "footer.faq": "FAQ",
    }
  };

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.innerHTML = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('tera-lang', lang);
  }

  const saved = localStorage.getItem('tera-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>
