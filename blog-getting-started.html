    @keyframes breathe      { from { opacity: 0.35; }             to { opacity: 1; } }

    /* ── Header ── */
    header {
      background: rgba(240,239,250,0.6);
      backdrop-filter: blur(24px) saturate(1.8);

    header .inner {

    }
    header .logo {
      width: 38px; height: 38px; border-radius: 10px;

    header .breadcrumb span.sep { margin: 0 6px; color: #b0b0c0; }

    .lang-toggle {
      display: flex; background: rgba(110,64,247,0.1);
      border-radius: 980px; padding: 3px; gap: 2px;
    }
    .lang-toggle button {
      border: none; background: transparent;
      padding: 5px 14px; border-radius: 980px;
      font-size: 13px; font-weight: 500; color: #6e6e73;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .lang-toggle button.active {
      background: #fff; color: #6e40f7; font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* ── Main ── */
    main { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }

    /* ── Post header ── */
    .post-header {
      padding: 48px 0 40px;
      border-bottom: 1px solid rgba(110,64,247,0.1);
      margin-bottom: 40px;
      animation: fadeUp 0.6s ease both;
    }
    .post-meta {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #9696a8;
      margin-bottom: 16px;
    }
    .post-title {
      font-size: 38px; font-weight: 800; letter-spacing: -1.2px;
      background: linear-gradient(135deg, #4c1d95 0%, #6e40f7 40%, #3b82f6 80%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1.15; margin-bottom: 16px;
    }
    .post-lead {
      font-size: 17px; color: #5a5a6a; line-height: 1.75; max-width: 600px;
    }

    /* ── Blog body ── */
    .post-body { animation: fadeUp 0.6s 0.1s ease both; }

    .post-body h2 {
      font-size: 22px; font-weight: 800; color: #1d1d1f;
      margin: 44px 0 14px; letter-spacing: -0.4px;
    }
    .post-body h2:first-child { margin-top: 0; }

    .post-body p {
      font-size: 16px; color: #3a3a4a; line-height: 1.85;
      margin-bottom: 16px;
    }

    .name-badge {
      display: inline-block;
      background: rgba(110,64,247,0.08);
      border: 1px solid rgba(110,64,247,0.18);
      color: #6e40f7;
      font-size: 14px; font-weight: 700;
      padding: 3px 10px; border-radius: 6px;
      font-family: ui-monospace, "SF Mono", monospace;
    }

    /* ── Steps ── */
    .steps { display: flex; flex-direction: column; gap: 12px; margin: 24px 0; }
    .step {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 16px; padding: 20px 24px;
      box-shadow: 0 3px 16px rgba(110,64,247,0.07), inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex; align-items: flex-start; gap: 16px;
    }
    .step-num {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      color: #fff; font-size: 14px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(110,64,247,0.32);
    }
    .step-body h4 { font-size: 15px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
    .step-body p  { font-size: 14px; color: #6e6e73; line-height: 1.65; margin: 0; }
    .step-body a  { color: #6e40f7; text-decoration: none; font-weight: 500; }
    .step-body a:hover { text-decoration: underline; }

    /* ── Callout ── */
    .callout {
      background: rgba(110,64,247,0.05);
      border-left: 3px solid rgba(110,64,247,0.4);
      border-radius: 0 12px 12px 0;
      padding: 16px 20px; margin: 24px 0;
      font-size: 14px; color: #4a4a5a; line-height: 1.75;
    }
    .callout strong { color: #6e40f7; }

    /* ── Screenshot ── */
    .screenshot {
      margin: 28px auto;
      text-align: center;
    }
    .screenshot img {
      max-width: 280px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
      display: block;
      margin: 0 auto;
    }
    .screenshot figcaption {
      margin-top: 10px;
      font-size: 13px;
      color: #9696a8;
      font-style: italic;
    }

    /* ── API links ── */
    .api-links { list-style: none; margin: 14px 0; display: flex; flex-direction: column; gap: 8px; }
    .api-links li { font-size: 14px; color: #4a4a5a; display: flex; align-items: center; gap: 10px; }
    .api-links li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #6e40f7; flex-shrink: 0; }
    .api-links .provider { font-weight: 700; color: #1d1d1f; min-width: 170px; }
    .api-links a { color: #6e40f7; text-decoration: none; font-weight: 500; }
    .api-links a:hover { text-decoration: underline; }

    /* ── Footer divider ── */
    .post-footer {
      margin-top: 56px; padding-top: 32px;
      border-top: 1px solid rgba(110,64,247,0.1);
      font-size: 14px; color: #6e6e73; line-height: 1.75;
    }
    .post-footer a { color: #6e40f7; text-decoration: none; font-weight: 500; }
    .post-footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      text-align: center; padding: 32px 24px;
      font-size: 13px; color: #9696a8; position: relative;
    }
    footer::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 200px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(110,64,247,0.4), transparent);
    }
    footer a { color: #9696a8; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: #6e40f7; }

    @media (max-width: 600px) {
      .post-title { font-size: 28px; }
    }
  </style>
</head>

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.innerHTML = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('tera-lang', lang);
  }

  const saved = localStorage.getItem('tera-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>
