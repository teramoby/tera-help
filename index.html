<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tera 帮助中心</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: transparent;
      color: #1d1d1f;
      line-height: 1.7;
    }

    /* ── Animated background ── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #f7f7fc;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
    }

    .orb-1 {
      width: 580px;
      height: 580px;
      background: radial-gradient(circle, rgba(110,64,247,0.28), transparent 70%);
      top: -180px;
      left: -120px;
      animation: drift1 22s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(59,130,246,0.22), transparent 70%);
      top: 35%;
      right: -140px;
      animation: drift2 28s ease-in-out infinite alternate;
    }

    .orb-3 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(6,182,212,0.18), transparent 70%);
      bottom: -80px;
      left: 30%;
      animation: drift3 24s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(90px, 70px); }
    }

    @keyframes drift2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-70px, 90px); }
    }

    @keyframes drift3 {
      from { transform: translate(0, 0); }
      to   { transform: translate(60px, -80px); }
    }

    header {
      background: rgba(247, 247, 252, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(110, 64, 247, 0.12);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: #fff;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 3px 12px rgba(110, 64, 247, 0.38);
    }

    header h1 {
      font-size: 19px;
      font-weight: 800;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex: 1;
    }

    .lang-toggle {
      display: flex;
      background: rgba(110, 64, 247, 0.08);
      border-radius: 980px;
      padding: 3px;
      gap: 2px;
    }

    .lang-toggle button {
      border: none;
      background: transparent;
      padding: 5px 14px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 500;
      color: #6e6e73;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-toggle button.active {
      background: #fff;
      color: #6e40f7;
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 56px 0 64px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 420px;
      background: radial-gradient(ellipse at 50% 40%,
        rgba(110,64,247,0.11) 0%,
        rgba(59,130,246,0.07) 40%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hero > * { position: relative; z-index: 1; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(110, 64, 247, 0.08);
      color: #6e40f7;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 980px;
      margin-bottom: 22px;
      border: 1px solid rgba(110, 64, 247, 0.2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero h2 {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #5b21b6 0%, #6e40f7 45%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
      line-height: 1.15;
    }

    .hero p {
      font-size: 18px;
      color: #6e6e73;
      max-width: 540px;
      margin: 0 auto;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6e40f7;
      margin: 52px 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 18px;
      height: 3px;
      background: linear-gradient(to right, #6e40f7, #3b82f6);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .hero h2 { font-size: 32px; }
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 2px 16px rgba(110,64,247,0.07), 0 1px 3px rgba(0,0,0,0.04);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(110,64,247,0.13), 0 4px 12px rgba(0,0,0,0.06);
    }

    .card .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .cards .card:nth-child(1) .icon { background: #ede9fe; }
    .cards .card:nth-child(2) .icon { background: #dbeafe; }
    .cards .card:nth-child(3) .icon { background: #fce7f3; }
    .cards .card:nth-child(4) .icon { background: #d1fae5; }

    .card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .card p {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.65;
    }

    /* ── Privacy card ── */
    .privacy-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 36px;
      box-shadow: 0 2px 16px rgba(110,64,247,0.07), 0 1px 3px rgba(0,0,0,0.04);
    }

    .privacy-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .privacy-items {
      display: flex;
      flex-direction: column;
      margin-top: 20px;
    }

    .privacy-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f7;
    }

    .privacy-item:last-child { border-bottom: none; }

    .privacy-item .pi-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .privacy-items .privacy-item:nth-child(1) .pi-icon { background: #ede9fe; }
    .privacy-items .privacy-item:nth-child(2) .pi-icon { background: #dbeafe; }
    .privacy-items .privacy-item:nth-child(3) .pi-icon { background: #d1fae5; }
    .privacy-items .privacy-item:nth-child(4) .pi-icon { background: #fef3c7; }

    .privacy-item .pi-body h4 {
      font-size: 15px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 4px;
    }

    .privacy-item .pi-body p {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.6;
    }

    .privacy-note {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(110,64,247,0.05);
      border-radius: 12px;
      border-left: 3px solid #6e40f7;
      font-size: 13px;
      color: #6e6e73;
    }

    .privacy-full-link {
      display: inline-block;
      border: 1.5px solid rgba(110,64,247,0.35);
      color: #6e40f7;
      text-decoration: none;
      padding: 9px 22px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }

    .privacy-full-link:hover {
      background: #6e40f7;
      color: #fff;
    }

    /* ── Contact card ── */
    .contact-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px 36px;
      box-shadow: 0 2px 16px rgba(110,64,247,0.07), 0 1px 3px rgba(0,0,0,0.04);
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, #6e40f7, #3b82f6, #06b6d4);
    }

    .contact-card .contact-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 58px;
      height: 58px;
      background: rgba(110,64,247,0.08);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .contact-card p {
      font-size: 15px;
      color: #6e6e73;
      margin-bottom: 18px;
    }

    .contact-card .email-link {
      display: inline-block;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 4px 14px rgba(110,64,247,0.32);
    }

    .contact-card .email-link:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .contact-card .group-link {
      display: inline-block;
      border: 1.5px solid rgba(110,64,247,0.35);
      color: #6e40f7;
      text-decoration: none;
      padding: 9px 22px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 600;
      margin-left: 10px;
      transition: background 0.15s, color 0.15s;
    }

    .contact-card .group-link:hover {
      background: #6e40f7;
      color: #fff;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero         { animation: fadeUp 0.6s ease both; }
    .cards        { animation: fadeUp 0.55s 0.12s ease both; }
    .privacy-card { animation: fadeUp 0.55s 0.18s ease both; }
    .contact-card { animation: fadeUp 0.55s 0.24s ease both; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 13px;
      color: #aeaeb2;
      position: relative;
    }

    footer::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 240px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(110,64,247,0.35), transparent);
    }
  </style>
</head>
<body>

<div class="bg-wrap" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<header>
  <div class="inner">
    <div class="logo">T</div>
    <h1>tera</h1>
    <div class="lang-toggle">
      <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-badge" data-i18n="hero.badge"></div>
    <h2 data-i18n="hero.title"></h2>
    <p data-i18n="hero.subtitle"></p>
  </section>

  <p class="section-title" data-i18n="features.label"></p>
  <div class="cards">
    <div class="card">
      <div class="icon">🔗</div>
      <h3 data-i18n="features.connect.title"></h3>
      <p data-i18n="features.connect.desc"></p>
    </div>
    <div class="card">
      <div class="icon">⚡️</div>
      <h3 data-i18n="features.parallel.title"></h3>
      <p data-i18n="features.parallel.desc"></p>
    </div>
    <div class="card">
      <div class="icon">🔍</div>
      <h3 data-i18n="features.verify.title"></h3>
      <p data-i18n="features.verify.desc"></p>
    </div>
    <div class="card">
      <div class="icon">🧩</div>
      <h3 data-i18n="features.synthesis.title"></h3>
      <p data-i18n="features.synthesis.desc"></p>
    </div>
  </div>

  <p class="section-title" data-i18n="privacy.label"></p>
  <div class="privacy-card">
    <h3 data-i18n="privacy.title"></h3>
    <div class="privacy-items">
      <div class="privacy-item">
        <div class="pi-icon">🔒</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.local.title"></h4>
          <p data-i18n="privacy.local.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">🚫</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.nocollect.title"></h4>
          <p data-i18n="privacy.nocollect.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">🛡️</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.noaccess.title"></h4>
          <p data-i18n="privacy.noaccess.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">🔑</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.keys.title"></h4>
          <p data-i18n="privacy.keys.desc"></p>
        </div>
      </div>
    </div>
    <p class="privacy-note" data-i18n="privacy.note"></p>
    <div style="margin-top:20px;">
      <a class="privacy-full-link" href="privacy.html" data-i18n="privacy.readFull"></a>
    </div>
  </div>

  <p class="section-title" data-i18n="help.label"></p>
  <div class="contact-card">
    <div class="contact-icon">✉️</div>
    <div>
      <h3 data-i18n="help.title"></h3>
      <p data-i18n="help.desc"></p>
      <a class="email-link" href="mailto:tera-help@googlegroups.com" data-i18n="help.emailBtn"></a>
      <a class="group-link" href="https://groups.google.com/g/tera-help" target="_blank" rel="noopener" data-i18n="help.groupBtn"></a>
    </div>
  </div>
</main>

<footer>
  <span data-i18n="footer.copy"></span>
</footer>

<script>
  const i18n = {
    zh: {
      "hero.badge": "AI 多模型助手",
      "hero.title": "智能多模型对话助手",
      "hero.subtitle": "连接主流大语言模型，同时调用多个模型并交叉验证，给你更可靠的综合答案。",
      "features.label": "功能介绍",
      "features.connect.title": "连接主流模型",
      "features.connect.desc": "支持接入目前流行的大语言模型，一个 App 满足所有对话需求。",
      "features.parallel.title": "多模型并发调用",
      "features.parallel.desc": "同时向多个模型发送请求，并行获取不同模型的回答，节省等待时间。",
      "features.verify.title": "交叉验证",
      "features.verify.desc": "让多个模型互相审阅彼此的回答，通过交叉验证识别错误与偏差，提升结果可信度。",
      "features.synthesis.title": "综合答案",
      "features.synthesis.desc": "基于多模型的反馈自动整合，给出更全面、更准确的最终结论。",
      "privacy.label": "隐私政策",
      "privacy.title": "我们承诺：您的数据只属于您",
      "privacy.local.title": "数据本地存储",
      "privacy.local.desc": "您的所有对话记录、配置信息均仅保存在您所安装的设备上，不会上传至任何服务器。",
      "privacy.nocollect.title": "零数据收集",
      "privacy.nocollect.desc": "tera 不收集、不记录任何用户数据，包括但不限于对话内容、使用习惯、设备信息及个人身份信息。",
      "privacy.noaccess.title": "开发者无法访问您的数据",
      "privacy.noaccess.desc": "tera 的开发者在技术层面无任何途径访问您的数据——我们没有后端服务器，没有数据管道，也没有任何遥测系统。",
      "privacy.keys.title": "API 密钥安全",
      "privacy.keys.desc": "您配置的第三方模型 API 密钥仅保存在本地设备的安全存储中，tera 开发者无从获取，也不会将其用于任何其他目的。",
      "privacy.note": "tera 直接在您的设备上与您所选择的 AI 服务商通信。请参阅您所使用的模型服务商的隐私政策，了解其数据处理方式。",
      "privacy.readFull": "查看完整隐私政策 →",
      "help.label": "获取帮助",
      "help.title": "联系我们 / 加入社群",
      "help.desc": "使用过程中遇到问题，或有功能建议？欢迎发送邮件到我们的支持邮件组，也欢迎加入 Google Groups 与其他用户交流。",
      "help.emailBtn": "发送邮件",
      "help.groupBtn": "加入 Google Group",
      "footer.copy": "© 2026 tera · tera-help@googlegroups.com",
    },
    en: {
      "hero.badge": "Multi-Model AI Assistant",
      "hero.title": "Multi-Model AI Assistant",
      "hero.subtitle": "Connect to leading large language models, query multiple models in parallel, cross-verify their answers, and get a more reliable synthesized response.",
      "features.label": "Features",
      "features.connect.title": "Connect to Popular Models",
      "features.connect.desc": "Integrate with today's most popular large language models — one app for all your AI conversations.",
      "features.parallel.title": "Parallel Model Calls",
      "features.parallel.desc": "Send your query to multiple models simultaneously and receive their answers in parallel, saving you time.",
      "features.verify.title": "Cross-Verification",
      "features.verify.desc": "Have models review each other's responses to identify errors and inconsistencies, boosting confidence in the result.",
      "features.synthesis.title": "Synthesized Answer",
      "features.synthesis.desc": "Automatically combines insights from all models into one comprehensive, accurate final answer.",
      "privacy.label": "Privacy Policy",
      "privacy.title": "Your Data Belongs to You — Always",
      "privacy.local.title": "Stored Locally on Your Device",
      "privacy.local.desc": "All your conversations and settings are saved exclusively on your device and are never uploaded to any server.",
      "privacy.nocollect.title": "Zero Data Collection",
      "privacy.nocollect.desc": "tera does not collect or record any user data — including but not limited to conversation content, usage patterns, device information, or personal identifiers.",
      "privacy.noaccess.title": "Developers Cannot Access Your Data",
      "privacy.noaccess.desc": "tera's developers have no technical means to access your data. There are no backend servers, no data pipelines, and no telemetry systems of any kind.",
      "privacy.keys.title": "API Key Security",
      "privacy.keys.desc": "Any third-party API keys you configure are stored only in your device's secure local storage. They are inaccessible to tera's developers and are never used for any other purpose.",
      "privacy.note": "tera communicates directly from your device to the AI provider of your choice. Please refer to your chosen model provider's privacy policy for details on how they handle your data.",
      "privacy.readFull": "Read full Privacy Policy →",
      "help.label": "Get Help",
      "help.title": "Contact Us / Join the Community",
      "help.desc": "Run into an issue or have a feature request? Send us an email or join our Google Group to connect with other users.",
      "help.emailBtn": "Send Email",
      "help.groupBtn": "Join Google Group",
      "footer.copy": "© 2026 tera · tera-help@googlegroups.com",
    }
  };

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) {
        el.textContent = i18n[lang][key];
      }
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('tera-lang', lang);
  }

  const saved = localStorage.getItem('tera-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>

</body>
</html>
