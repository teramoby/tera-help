      "q3.body": "打开 tera，进入「设置 → 模型配置」，选择对应的服务商，将 API 密钥粘贴到输入框并保存。密钥会安全存储在系统 Keychain（macOS 钥匙串）中，不会以明文形式保存在任何文件里。",
      "q4.title": "综合答案是如何生成的？",
      "q4.body": "当您提交一个问题，tera 会同时向您选择的多个模型发起请求，并行获取各自的回答。收到所有回答后，tera 将它们汇总发给一个模型，由该模型综合整理，生成一个客观可靠的最终答案。",

      "q5.body": "会，但仅保存在您的本地设备上。对话数据不会上传至任何服务器，tera 的开发者也在技术上无法访问您的任何数据。",

      "q8.body": "tera 应用本身免费下载使用。您只需为实际使用的 AI 服务商的 API 调用支付费用，费用由各服务商按其定价标准收取，与 tera 无关。",

      "q9.body": "tera 支持 iPhone、iPad 及 Mac，可在 App Store 中搜索 teramoby 免费下载。",

      "contact.btn": "发送邮件",
      "footer.tagline": "Many Models, One Answer. 由 teramoby 开发。",
      "footer.qrCaption": "扫码下载 App Store",
      "footer.copy": "© 2026 teramoby · tera-support@teramoby.com",
      "footer.home": "帮助中心",
      "footer.privacy": "隐私政策",
    },
    en: {
      "nav.launch": "Launch",
      "nav.guide": "Guide",
      "nav.faq": "FAQ",
      "nav.privacy": "Privacy",
      "hero.badge": "FAQ",
      "hero.title": "Got Questions?",
      "hero.subtitle": "Answers to the most common questions about tera. Still not finding what you need? Just email us.",
      "s.basic.label": "Basics",
      "q1.title": "What AI models does tera support?",
      "q1.body": "tera supports major large language model providers including OpenAI, Anthropic, Google, and more. The full list of available models can be found in the app under Settings → Model Configuration. We add new providers regularly.",
      "q2.title": "Why do I need my own API key?",
      "q2.body": "tera communicates directly with AI providers without any intermediary server. Using your own API key means your requests travel straight from your device to the provider — fully transparent, more secure, and free from any third-party interception.",
      "q3.title": "How do I add an API key?",
      "q3.body": "Open tera, go to Settings → Model Configuration, select your provider, paste your API key, and save. Keys are stored securely in your system Keychain and are never written to disk as plain text.",
      "q4.title": "How does tera generate the final answer?",
      "q4.body": "When you submit a question, tera simultaneously sends it to all the models you've selected and collects their responses in parallel. Once all answers are in, tera sends them together to a single model, which synthesizes them into one objective, reliable final answer.",
      "q_apikey.title": "Where do I get API keys for each provider?",
      "q_apikey.intro": "Click the links below to visit each provider's official page to create or retrieve your API key:",
      "q_apikey.get": "Get API Key →",
      "s.privacy.label": "Privacy & Security",
      "q5.title": "Does tera save my conversations?",
      "q5.body": "Yes — but only locally on your device. No conversation data is ever uploaded to any server, and tera's developers have no technical means to access your data.",
      "q6.title": "Are my API keys safe?",
      "q6.body": "Yes. All API keys you configure are stored in your system's secure storage (macOS Keychain). They are never written to disk as plain text, and are never transmitted to tera's developers or any third party.",
      "q7.title": "Does tera collect usage or analytics data?",
      "q7.body": "No. tera has no backend servers, data pipelines, or telemetry of any kind. We do not collect or record any user behavior, device information, or personal identifiers.",
      "s.billing.label": "Download & Pricing",
      "q8.title": "Is tera free?",
      "q8.body": "tera is free to download and use. You only pay for the API calls you make to the AI providers you choose — billed directly by those providers at their own rates. tera takes no cut.",
      "q9.title": "What platforms are supported?",
      "q9.body": "tera is available for iPhone, iPad, and Mac. Search for teramoby on the App Store to download for free.",
      "s.contact.label": "Still Have Questions?",
      "contact.title": "Didn't find your answer?",
      "contact.desc": "Send us an email and we'll get back to you. We read every message.",
      "contact.btn": "Send Email",
      "footer.tagline": "Many Models, One Answer. Built by teramoby.",
      "footer.qrCaption": "Scan for the App Store",
      "footer.copy": "© 2026 teramoby · tera-support@teramoby.com",
      "footer.home": "Help Center",
      "footer.privacy": "Privacy Policy",
    }
  };

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('tera-lang', lang);
  }

  function toggle(el) { el.parentElement.classList.toggle('open'); }

  const saved = localStorage.getItem('tera-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);

  if (location.hash) {
    const target = document.querySelector(location.hash);
    if (target && target.classList.contains('faq-item')) {
      target.classList.add('open');
      setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
  }
</script>
