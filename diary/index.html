<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraDiary · AI 日记</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scrollbar-gutter: stable;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: transparent;
      color: #1d1d1f;
      line-height: 1.7;
    }

    /* ── Animated background ── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #f0fdf4;
      overflow: hidden;
      transform: translateZ(0);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      will-change: transform;
    }

    .orb-1 {
      width: 640px; height: 640px;
      background: radial-gradient(circle, rgba(90,153,120,0.18), transparent 68%);
      top: -220px; left: -140px;
      animation: drift1 22s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(74,133,104,0.14), transparent 68%);
      top: 30%; right: -160px;
      animation: drift2 28s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(128,200,168,0.14), transparent 68%);
      bottom: -100px; left: 28%;
      animation: drift3 24s ease-in-out infinite alternate;
    }
    .orb-4 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(144,220,180,0.08), transparent 68%);
      top: 55%; left: -60px;
      animation: drift1 32s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(100px,80px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-80px,100px); } }
    @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(70px,-90px); } }

    /* ── Geometric decorations ── */
    .ring {
      position: absolute; border-radius: 50%;
      pointer-events: none; will-change: transform, opacity;
    }
    .ring-1 { width:380px; height:380px; top:-40px; right:6%; border:1px solid rgba(90,153,120,0.16); animation: spin-ring 65s linear infinite, breathe 9s ease-in-out infinite alternate; }
    .ring-2 { width:240px; height:240px; top:36%; left:2%; border:1px solid rgba(74,133,104,0.13); animation: spin-ring 85s linear infinite reverse, breathe 13s ease-in-out infinite alternate; }
    .ring-3 { width:130px; height:130px; bottom:12%; right:22%; border:1px solid rgba(128,200,168,0.12); animation: spin-ring 50s linear infinite, breathe 7s ease-in-out infinite alternate; }
    .ring-4 { width:180px; height:180px; top:8%; left:28%; border:1px solid rgba(134,239,172,0.10); animation: spin-ring 75s linear infinite reverse, breathe 10s ease-in-out infinite alternate; }
    .ring-5 { width:90px; height:90px; top:72%; left:42%; border:1px solid rgba(90,153,120,0.11); animation: spin-ring 40s linear infinite, breathe 6s ease-in-out infinite alternate; }

    .diamond { position: absolute; pointer-events: none; will-change: transform, opacity; }
    .diamond-1 { width:70px; height:70px; top:18%; left:7%; border:1px solid rgba(90,153,120,0.14); animation: spin-diamond 42s linear infinite, breathe 8s ease-in-out infinite alternate; }
    .diamond-2 { width:44px; height:44px; bottom:22%; right:8%; border:1px solid rgba(74,133,104,0.11); animation: spin-diamond 58s linear infinite reverse, breathe 11s ease-in-out infinite alternate; }
    .diamond-3 { width:108px; height:108px; top:54%; right:14%; border:1px solid rgba(90,153,120,0.08); animation: spin-diamond 72s linear infinite, breathe 16s ease-in-out infinite alternate; }
    .diamond-4 { width:56px; height:56px; top:32%; right:3%; border:1px solid rgba(128,200,168,0.12); animation: spin-diamond 48s linear infinite, breathe 10s ease-in-out infinite alternate; }
    .diamond-5 { width:34px; height:34px; top:62%; left:22%; border:1px solid rgba(74,133,104,0.10); animation: spin-diamond 36s linear infinite reverse, breathe 8s ease-in-out infinite alternate; }

    @keyframes spin-ring    { from { transform: rotate(0deg); }   to { transform: rotate(360deg); } }
    @keyframes spin-diamond { from { transform: rotate(45deg); }  to { transform: rotate(405deg); } }
    @keyframes breathe      { from { opacity: 0.35; }             to { opacity: 1; } }

    /* ── Header ── */
    header {
      background: rgba(240,253,244,0.6);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-bottom: 1px solid rgba(90,153,120,0.12);
      position: sticky; top: 0; z-index: 100;
    }

    header .inner {
      max-width: 860px; margin: 0 auto;
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
    }

    header .logo {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #5a9978, #4a8568);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #fff; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 3px 14px rgba(90,153,120,0.42);
      letter-spacing: -0.5px;
    }

    header h1 {
      font-size: 19px; font-weight: 800;
      background: linear-gradient(135deg, #5a9978, #4a8568);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; flex: 1;
    }

    .lang-toggle {
      display: flex; background: rgba(90,153,120,0.1);
      border-radius: 980px; padding: 3px; gap: 2px;
    }
    .lang-toggle button {
      border: none; background: transparent;
      padding: 5px 14px; border-radius: 980px;
      font-size: 13px; font-weight: 500; color: #6e6e73;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .lang-toggle button.active {
      background: #fff; color: #5a9978; font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* ── Main ── */
    main {
      max-width: 860px; margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center; padding: 64px 0 72px;
      position: relative; overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(90,153,120,0.14) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse at 50% 55%, black 15%, transparent 62%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 55%, black 15%, transparent 62%);
      pointer-events: none; z-index: 0;
    }
    .hero > * { position: relative; z-index: 1; }

    .hero-badge {
      display: inline-flex; align-items: center;
      background: rgba(90,153,120,0.1); color: #5a9978;
      font-size: 11px; font-weight: 800;
      padding: 5px 14px; border-radius: 980px;
      margin-bottom: 24px;
      border: 1px solid rgba(90,153,120,0.22);
      letter-spacing: 0.08em; text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .hero h2 {
      font-size: 46px; font-weight: 800; letter-spacing: -1.5px;
      background: linear-gradient(135deg, #1a4030 0%, #5a9978 40%, #4a8568 80%, #80c8a8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 20px; line-height: 1.12;
    }

    .hero p {
      font-size: 17px; color: #5a5a6a;
      max-width: 520px; margin: 0 auto; line-height: 1.75;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.12em; color: #5a9978;
      margin: 52px 0 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: ''; display: block;
      width: 18px; height: 3px;
      background: linear-gradient(to right, #5a9978, #4a8568);
      border-radius: 2px; flex-shrink: 0;
    }

    /* ── Cards ── */
    .cards {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 32px;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .hero h2 { font-size: 32px; }
    }

    .card {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 20px; padding: 28px;
      box-shadow:
        0 4px 24px rgba(90,153,120,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: fadeUp 0.5s ease both;
      will-change: transform; transform: translateZ(0);
    }
    .cards .card:nth-child(1) { animation-delay: 0.05s; }
    .cards .card:nth-child(2) { animation-delay: 0.13s; }
    .cards .card:nth-child(3) { animation-delay: 0.21s; }
    .cards .card:nth-child(4) { animation-delay: 0.29s; }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(90,153,120,0.22);
      box-shadow:
        0 0 0 1px rgba(90,153,120,0.18),
        0 20px 56px rgba(90,153,120,0.14),
        0 4px 12px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .card .icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 16px;
    }
    .cards .card:nth-child(1) .icon { background: rgba(220,252,231,0.9); }
    .cards .card:nth-child(2) .icon { background: rgba(167,243,208,0.9); }
    .cards .card:nth-child(3) .icon { background: rgba(209,250,229,0.9); }
    .cards .card:nth-child(4) .icon { background: rgba(254,243,199,0.9); }

    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }
    .card p  { font-size: 14px; color: #6e6e73; line-height: 1.65; }

    /* ── Privacy card ── */
    .privacy-card {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 20px; padding: 32px 36px;
      box-shadow:
        0 4px 24px rgba(90,153,120,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      animation: fadeUp 0.5s 0.18s ease both;
    }

    .privacy-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }

    .privacy-items { display: flex; flex-direction: column; margin-top: 20px; }

    .privacy-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(90,153,120,0.08);
    }
    .privacy-item:last-child { border-bottom: none; }

    .privacy-item .pi-icon {
      font-size: 20px; flex-shrink: 0;
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .privacy-items .privacy-item:nth-child(1) .pi-icon { background: rgba(220,252,231,0.9); }
    .privacy-items .privacy-item:nth-child(2) .pi-icon { background: rgba(209,250,229,0.9); }
    .privacy-items .privacy-item:nth-child(3) .pi-icon { background: rgba(167,243,208,0.9); }
    .privacy-items .privacy-item:nth-child(4) .pi-icon { background: rgba(254,243,199,0.9); }

    .privacy-item .pi-body h4 { font-size: 15px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
    .privacy-item .pi-body p  { font-size: 14px; color: #6e6e73; line-height: 1.6; }

    .privacy-note {
      margin-top: 20px; padding: 14px 18px;
      background: rgba(90,153,120,0.06);
      border-radius: 12px;
      border-left: 3px solid rgba(90,153,120,0.5);
      font-size: 13px; color: #6e6e73;
    }

    .privacy-full-link {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1.5px solid rgba(90,153,120,0.3);
      color: #5a9978; text-decoration: none;
      padding: 9px 22px; border-radius: 980px;
      font-size: 14px; font-weight: 600;
      transition: background 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
      backdrop-filter: blur(8px);
    }
    .privacy-full-link:hover {
      background: #5a9978; color: #fff; border-color: #5a9978;
      box-shadow: 0 4px 14px rgba(90,153,120,0.18);
    }

    /* ── Contact card ── */
    .contact-card {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255,255,255,0.88);
      border-radius: 20px; padding: 32px 36px;
      box-shadow:
        0 4px 24px rgba(90,153,120,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex; align-items: flex-start; gap: 20px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.5s 0.24s ease both;
    }
    .contact-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(to right, #5a9978, #4a8568, #80c8a8);
    }
    .contact-card .contact-icon {
      font-size: 26px; flex-shrink: 0;
      width: 56px; height: 56px;
      background: rgba(90,153,120,0.1);
      border: 1px solid rgba(90,153,120,0.15);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .contact-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .contact-card p  { font-size: 15px; color: #6e6e73; margin-bottom: 18px; }
    .contact-card .email-link {
      display: inline-flex; align-items: center;
      background: linear-gradient(135deg, #5a9978, #4a8568);
      color: #fff; text-decoration: none;
      padding: 10px 22px; border-radius: 980px;
      font-size: 14px; font-weight: 600;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(90,153,120,0.36);
    }
    .contact-card .email-link:hover {
      opacity: 0.9; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(90,153,120,0.44);
    }
    .contact-card .group-link {
      display: inline-flex; align-items: center;
      border: 1.5px solid rgba(90,153,120,0.3);
      color: #5a9978; text-decoration: none;
      padding: 9px 22px; border-radius: 980px;
      font-size: 14px; font-weight: 600;
      margin-left: 10px;
      transition: background 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
      backdrop-filter: blur(8px);
    }
    .contact-card .group-link:hover {
      background: #5a9978; color: #fff; border-color: #5a9978;
      box-shadow: 0 4px 14px rgba(90,153,120,0.32);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero { animation: fadeUp 0.65s ease both; }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 32px 24px;
      font-size: 13px; color: #9696a8; position: relative;
    }
    footer::before {
      content: ''; position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 200px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(90,153,120,0.4), transparent);
    }
    footer a { color: #9696a8; text-decoration: none; margin: 0 8px; }
    footer a:hover { color: #5a9978; }
  </style>
</head>
<body>

<div class="bg-wrap" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="diamond diamond-1"></div>
  <div class="diamond diamond-2"></div>
  <div class="diamond diamond-3"></div>
  <div class="ring ring-4"></div>
  <div class="ring ring-5"></div>
  <div class="diamond diamond-4"></div>
  <div class="diamond diamond-5"></div>
</div>

<header>
  <div class="inner">
    <div class="logo">td</div>
    <h1>TeraDiary</h1>
    <div class="lang-toggle">
      <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-badge" data-i18n="hero.badge"></div>
    <h2 data-i18n="hero.title"></h2>
    <p data-i18n="hero.subtitle"></p>
  </section>

  <p class="section-title" data-i18n="features.label"></p>
  <div class="cards">
    <div class="card">
      <div class="icon">✍️</div>
      <h3 data-i18n="features.ai.title"></h3>
      <p data-i18n="features.ai.desc"></p>
    </div>
    <div class="card">
      <div class="icon">🔒</div>
      <h3 data-i18n="features.privacy.title"></h3>
      <p data-i18n="features.privacy.desc"></p>
    </div>
    <div class="card">
      <div class="icon">☁️</div>
      <h3 data-i18n="features.icloud.title"></h3>
      <p data-i18n="features.icloud.desc"></p>
    </div>
    <div class="card">
      <div class="icon">🤖</div>
      <h3 data-i18n="features.llm.title"></h3>
      <p data-i18n="features.llm.desc"></p>
    </div>
  </div>

  <p class="section-title" data-i18n="privacy.label"></p>
  <div class="privacy-card">
    <h3 data-i18n="privacy.title"></h3>
    <div class="privacy-items">
      <div class="privacy-item">
        <div class="pi-icon">🔒</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.local.title"></h4>
          <p data-i18n="privacy.local.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">☁️</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.icloud.title"></h4>
          <p data-i18n="privacy.icloud.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">🤖</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.ai.title"></h4>
          <p data-i18n="privacy.ai.desc"></p>
        </div>
      </div>
      <div class="privacy-item">
        <div class="pi-icon">🛡️</div>
        <div class="pi-body">
          <h4 data-i18n="privacy.nodev.title"></h4>
          <p data-i18n="privacy.nodev.desc"></p>
        </div>
      </div>
    </div>
    <p class="privacy-note" data-i18n="privacy.note"></p>
    <div style="margin-top:20px;">
      <a class="privacy-full-link" href="privacy.html" data-i18n="privacy.readFull"></a>
    </div>
  </div>

  <p class="section-title" data-i18n="help.label"></p>
  <div class="contact-card">
    <div class="contact-icon">✉️</div>
    <div>
      <h3 data-i18n="help.title"></h3>
      <p data-i18n="help.desc"></p>
      <a class="email-link" href="mailto:tera-support@teramoby.com" data-i18n="help.emailBtn"></a>
      <a class="group-link" href="https://groups.google.com/g/tera-help" target="_blank" rel="noopener" data-i18n="help.groupBtn"></a>
    </div>
  </div>
</main>

<footer>
  <span data-i18n="footer.copy"></span>
  <br style="margin-bottom:6px;">
  <a href="privacy.html" data-i18n="footer.privacy"></a>
</footer>

<script>
  const i18n = {
    zh: {
      "hero.badge": "AI 日记伴侣",
      "hero.title": "记录生活，AI 相伴",
      "hero.subtitle": "用文字记录每一天，TeraDiary 会认真聆听并给出 AI 的回复与思考，让日记不再只是自言自语。",
      "features.label": "功能特点",
      "features.ai.title": "安静的陪伴",
      "features.ai.desc": "自由地写，TeraDiary 会轻声回应你的文字，像一位安静陪在身边的倾听者。",
      "features.privacy.title": "数据本地存储",
      "features.privacy.desc": "日记数据默认仅保存在您的设备上，开发者无法访问您的任何内容，隐私安全有保障。",
      "features.icloud.title": "iCloud 同步（可选）",
      "features.icloud.desc": "开启 iCloud 同步后，日记可在您的所有 Apple 设备间无缝同步，数据存储在您自己的 iCloud 账户中。",
      "features.llm.title": "自定义 AI 模型",
      "features.llm.desc": "配置您自己的 LLM API 密钥，使用偏好的 AI 服务商，数据直接从您的设备发送至服务商，完全由您掌控。",
      "privacy.label": "隐私与数据",
      "privacy.title": "您的日记，完全属于您",

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('teradiary-lang', lang);
  }

  const saved = localStorage.getItem('teradiary-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>
