<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tera · Privacy Policy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: transparent;
      color: #1d1d1f;
      line-height: 1.7;
    }

    /* ── Animated background ── */
    .bg-wrap {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: #f0effa;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }

    .orb-1 {
      width: 640px;
      height: 640px;
      background: radial-gradient(circle, rgba(110,64,247,0.32), transparent 68%);
      top: -220px;
      left: -140px;
      animation: drift1 22s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(59,130,246,0.26), transparent 68%);
      top: 30%;
      right: -160px;
      animation: drift2 28s ease-in-out infinite alternate;
    }

    .orb-3 {
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, rgba(6,182,212,0.22), transparent 68%);
      bottom: -100px;
      left: 28%;
      animation: drift3 24s ease-in-out infinite alternate;
    }

    .orb-4 {
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(236,72,153,0.14), transparent 68%);
      top: 55%;
      left: -60px;
      animation: drift1 32s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(100px, 80px); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-80px, 100px); }
    }
    @keyframes drift3 {
      from { transform: translate(0, 0); }
      to   { transform: translate(70px, -90px); }
    }

    /* ── Geometric decorations ── */
    .ring {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .ring-1 {
      width: 380px;
      height: 380px;
      top: -40px;
      right: 6%;
      border: 1px solid rgba(110,64,247,0.16);
      animation: spin-ring 65s linear infinite, breathe 9s ease-in-out infinite alternate;
    }

    .ring-2 {
      width: 240px;
      height: 240px;
      top: 36%;
      left: 2%;
      border: 1px solid rgba(59,130,246,0.13);
      animation: spin-ring 85s linear infinite reverse, breathe 13s ease-in-out infinite alternate;
    }

    .ring-3 {
      width: 130px;
      height: 130px;
      bottom: 12%;
      right: 22%;
      border: 1px solid rgba(6,182,212,0.12);
      animation: spin-ring 50s linear infinite, breathe 7s ease-in-out infinite alternate;
    }

    .diamond {
      position: absolute;
      pointer-events: none;
    }

    .diamond-1 {
      width: 70px;
      height: 70px;
      top: 18%;
      left: 7%;
      border: 1px solid rgba(110,64,247,0.14);
      animation: spin-diamond 42s linear infinite, breathe 8s ease-in-out infinite alternate;
    }

    .diamond-2 {
      width: 44px;
      height: 44px;
      bottom: 22%;
      right: 8%;
      border: 1px solid rgba(59,130,246,0.11);
      animation: spin-diamond 58s linear infinite reverse, breathe 11s ease-in-out infinite alternate;
    }

    .diamond-3 {
      width: 108px;
      height: 108px;
      top: 54%;
      right: 14%;
      border: 1px solid rgba(110,64,247,0.08);
      animation: spin-diamond 72s linear infinite, breathe 16s ease-in-out infinite alternate;
    }

    .ring-4 {
      width: 180px;
      height: 180px;
      top: 8%;
      left: 28%;
      border: 1px solid rgba(236,72,153,0.10);
      animation: spin-ring 75s linear infinite reverse, breathe 10s ease-in-out infinite alternate;
    }

    .ring-5 {
      width: 90px;
      height: 90px;
      top: 72%;
      left: 42%;
      border: 1px solid rgba(110,64,247,0.11);
      animation: spin-ring 40s linear infinite, breathe 6s ease-in-out infinite alternate;
    }

    .diamond-4 {
      width: 56px;
      height: 56px;
      top: 32%;
      right: 3%;
      border: 1px solid rgba(6,182,212,0.12);
      animation: spin-diamond 48s linear infinite, breathe 10s ease-in-out infinite alternate;
    }

    .diamond-5 {
      width: 34px;
      height: 34px;
      top: 62%;
      left: 22%;
      border: 1px solid rgba(59,130,246,0.10);
      animation: spin-diamond 36s linear infinite reverse, breathe 8s ease-in-out infinite alternate;
    }

    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes spin-diamond {
      from { transform: rotate(45deg); }
      to   { transform: rotate(405deg); }
    }

    @keyframes breathe {
      from { opacity: 0.35; }
      to   { opacity: 1; }
    }

    /* ── Header ── */
    header {
      background: rgba(240, 239, 250, 0.6);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-bottom: 1px solid rgba(110, 64, 247, 0.12);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 800;
      flex-shrink: 0;
      text-decoration: none;
      box-shadow: 0 3px 14px rgba(110, 64, 247, 0.42);
      letter-spacing: -0.5px;
    }

    header .breadcrumb {
      flex: 1;
      font-size: 15px;
      color: #6e6e73;
    }

    header .breadcrumb a {
      color: #6e40f7;
      text-decoration: none;
      font-weight: 700;
    }

    header .breadcrumb a:hover { opacity: 0.7; }
    header .breadcrumb span.sep { margin: 0 6px; color: #b0b0c0; }

    .lang-toggle {
      display: flex;
      background: rgba(110, 64, 247, 0.1);
      border-radius: 980px;
      padding: 3px;
      gap: 2px;
    }

    .lang-toggle button {
      border: none;
      background: transparent;
      padding: 5px 14px;
      border-radius: 980px;
      font-size: 13px;
      font-weight: 500;
      color: #6e6e73;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-toggle button.active {
      background: #fff;
      color: #6e40f7;
      font-weight: 700;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 64px 0 72px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(110,64,247,0.14) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(ellipse at 50% 55%, black 15%, transparent 62%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 55%, black 15%, transparent 62%);
      pointer-events: none;
      z-index: 0;
    }

    .hero > * { position: relative; z-index: 1; }

    .hero h2 {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #4c1d95 0%, #6e40f7 40%, #3b82f6 80%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1.12;
    }

    .hero p {
      font-size: 17px;
      color: #5a5a6a;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* ── Section title ── */
    .section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6e40f7;
      margin: 52px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 18px;
      height: 3px;
      background: linear-gradient(to right, #6e40f7, #3b82f6);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Date chip ── */
    .date-chip {
      display: inline-flex;
      align-items: center;
      background: rgba(110,64,247,0.08);
      color: #6e40f7;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 980px;
      margin-bottom: 36px;
      border: 1px solid rgba(110,64,247,0.16);
      backdrop-filter: blur(8px);
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 32px;
    }

    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
      .hero h2 { font-size: 32px; }
    }

    .card {
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      padding: 28px;
      box-shadow:
        0 4px 24px rgba(110,64,247,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: fadeUp 0.5s ease both;
    }

    .cards .card:nth-child(1) { animation-delay: 0.05s; }
    .cards .card:nth-child(2) { animation-delay: 0.13s; }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(110, 64, 247, 0.22);
      box-shadow:
        0 0 0 1px rgba(110,64,247,0.18),
        0 20px 56px rgba(110,64,247,0.14),
        0 4px 12px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .card .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
    }

    .cards .card:nth-child(1) .icon { background: rgba(237,233,254,0.9); }
    .cards .card:nth-child(2) .icon { background: rgba(219,234,254,0.9); }

    .card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .card p {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.65;
    }

    /* ── Prose card ── */
    .prose-card {
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      padding: 28px;
      box-shadow:
        0 4px 24px rgba(110,64,247,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.18s ease both;
    }

    .prose-card .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      background: rgba(224,242,254,0.9);
    }

    .prose-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .prose-card p {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.65;
    }

    .prose-card .note {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(110,64,247,0.06);
      border-left: 3px solid rgba(110,64,247,0.4);
      border-radius: 0 10px 10px 0;
      font-size: 13px;
      color: #6e6e73;
    }

    /* ── Contact card ── */
    .contact-card {
      background: rgba(255, 255, 255, 0.62);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 20px;
      padding: 32px 36px;
      box-shadow:
        0 4px 24px rgba(110,64,247,0.08),
        0 1px 4px rgba(0,0,0,0.04),
        inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex;
      align-items: flex-start;
      gap: 20px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.24s ease both;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, #6e40f7, #3b82f6, #06b6d4);
    }

    .contact-card .contact-icon {
      font-size: 26px;
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: rgba(110,64,247,0.1);
      border: 1px solid rgba(110,64,247,0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contact-card h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .contact-card p {
      font-size: 15px;
      color: #6e6e73;
      margin-bottom: 18px;
    }

    .contact-card .email-link {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #6e40f7, #3b82f6);
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 980px;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 16px rgba(110,64,247,0.36);
    }

    .contact-card .email-link:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(110,64,247,0.44);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero       { animation: fadeUp 0.65s ease both; }
    .date-chip  { animation: fadeUp 0.5s 0.1s ease both; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 13px;
      color: #9696a8;
      position: relative;
    }

    footer::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(110,64,247,0.4), transparent);
    }
  </style>
</head>
<body>

<div class="bg-wrap" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>
  <div class="diamond diamond-1"></div>
  <div class="diamond diamond-2"></div>
  <div class="diamond diamond-3"></div>
  <div class="ring ring-4"></div>
  <div class="ring ring-5"></div>
  <div class="diamond diamond-4"></div>
  <div class="diamond diamond-5"></div>
</div>

<header>
  <div class="inner">
    <a class="logo" href="index.html"><img src="/favicon-32x32.png?v=2" alt="tera" width="22" height="22" style="border-radius:5px;display:block;"></a>
    <div class="breadcrumb">
      <a href="index.html">tera</a>
      <span class="sep">›</span>
      <span data-i18n="nav.privacy"></span>
    </div>
    <div class="lang-toggle">
      <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <h2 data-i18n="hero.title"></h2>
    <p data-i18n="hero.subtitle"></p>
  </section>

  <span class="date-chip" data-i18n="page.date"></span>

  <p class="section-title" data-i18n="s.storage.label"></p>
  <div class="cards">
    <div class="card">
      <div class="icon">🔒</div>
      <h3 data-i18n="s1.title"></h3>
      <p data-i18n="s1.body"></p>
    </div>
    <div class="card">
      <div class="icon">🚫</div>
      <h3 data-i18n="s2.title"></h3>
      <p data-i18n="s2.body"></p>
    </div>
  </div>

  <p class="section-title" data-i18n="s.access.label"></p>
  <div class="cards">
    <div class="card">
      <div class="icon">🛡️</div>
      <h3 data-i18n="s3.title"></h3>
      <p data-i18n="s3.body"></p>
    </div>
    <div class="card">
      <div class="icon">🔑</div>
      <h3 data-i18n="s4.title"></h3>
      <p data-i18n="s4.body"></p>
    </div>
  </div>

  <p class="section-title" data-i18n="s.third.label"></p>
  <div class="prose-card">
    <div class="icon">🌐</div>
    <h3 data-i18n="s5.title"></h3>
    <p data-i18n="s5.body"></p>
    <p data-i18n="s5.body2" style="margin-top:12px;"></p>
    <div class="note" data-i18n="s5.note"></div>
  </div>

  <p class="section-title" data-i18n="s.contact.label"></p>
  <div class="contact-card">
    <div class="contact-icon">✉️</div>
    <div>
      <h3 data-i18n="s6.title"></h3>
      <p data-i18n="s6.body"></p>
      <a class="email-link" href="mailto:tera-support@teramoby.com" data-i18n="s6.btn"></a>
    </div>
  </div>
</main>

<footer>
  <span data-i18n="footer.copy"></span>
</footer>

<script>
  const i18n = {
    zh: {
      "nav.privacy": "隐私政策",
      "hero.title": "隐私政策",
      "hero.subtitle": "tera 不保存您的任何信息。所有数据仅存储在您的设备上，开发者在技术上无任何途径获取您的数据。",
      "page.date": "生效日期：2026 年 3 月 13 日",
      "s.storage.label": "数据存储",
      "s1.title": "数据本地存储",
      "s1.body": "您在 tera 中产生的所有数据——包括对话记录、应用配置、偏好设置——均仅保存在您所安装的设备上。我们没有云端同步、没有远程备份，也没有任何形式的服务器端存储。",
      "s2.title": "零数据收集",
      "s2.body": "tera 不收集、不记录、不传输任何用户数据，包括：对话内容与历史记录、使用行为与统计、设备信息与标识符、地理位置信息，以及任何个人身份信息（PII）。",
      "s.access.label": "数据安全",
      "s3.title": "开发者无法访问您的数据",
      "s3.body": "tera 不设任何后端服务器、数据管道或遥测系统。即便开发者想获取您的数据，在技术上也无从实现。您的隐私受到架构层面的保护，而非仅依赖于承诺。",
      "s4.title": "API 密钥安全",
      "s4.body": "您配置的第三方 AI 服务商 API 密钥，仅存储于本地设备的系统安全存储中（如 macOS Keychain）。这些密钥不会传输给 tera 开发者，也不会用于其他任何目的。",
      "s.third.label": "第三方服务",
      "s5.title": "第三方 AI 服务商",
      "s5.body": "tera 的核心功能是将您在对话框中输入的文本内容（消息与提示词）直接从您的设备传输至您主动选择并配置的 AI 服务商（如 OpenAI、Anthropic、Google Gemini 等），以获取 AI 生成的回复。传输通过您自己提供的 API 密钥与服务商直接建立连接，tera 不对此内容进行拦截、存储或任何形式的处理。",
      "s5.body2": "此数据传输完全由您主动发起：您自主决定使用哪家服务商、配置对应的 API 密钥，并在每次对话时决定发送的内容。您对所有数据的流向拥有完全控制权。您的对话内容仅用于向所选服务商请求回复，不作任何其他用途。",

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('tera-lang', lang);
  }

  const saved = localStorage.getItem('tera-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>
