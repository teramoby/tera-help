<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-64.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraJournal · AI Journal Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="/assets/site.css">
</head>
<body class="theme-journal">

<header class="site-header">
  <div class="inner">
    <a href="/journal/" class="brand">
      <img src="/icon-64.png" alt="">
      <span>TeraJournal</span>
    </a>
    <div class="spacer"></div>
    <nav>
      <a href="/journal/privacy.html" data-i18n="footer.privacy"></a>
      <a href="https://apps.apple.com/us/app/terajournal/id6760472493" target="_blank" rel="noopener" data-i18n="nav.appstore"></a>
    </nav>
    <div class="lang-toggle">
      <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <p class="eyebrow" data-i18n="hero.badge"></p>
    <h1 data-i18n="hero.title"></h1>
    <p class="lede" data-i18n="hero.subtitle"></p>

    <div class="hero-download">
      <div class="download-stack">
        <a class="btn btn-primary" href="https://apps.apple.com/us/app/terajournal/id6760472493" target="_blank" rel="noopener" data-i18n="hero.downloadBtn"></a>
        <p class="download-meta" data-i18n="hero.downloadMeta"></p>
      </div>
      <a class="hero-qr" href="https://apps.apple.com/us/app/terajournal/id6760472493" target="_blank" rel="noopener">
        <img src="/img/qr-journal-appstore.png" alt="App Store QR">
        <div class="qr-text">
          <strong data-i18n="hero.qrTitle"></strong>
          <span data-i18n="hero.appstoreLabel"></span>
        </div>
      </a>
    </div>
  </section>

  <section class="section">
    <p class="section-eyebrow" data-i18n="features.label"></p>
    <h2 class="section-title" data-i18n="features.headline"></h2>
    <div class="grid">
      <div class="grid-item">
        <p class="num">01</p>
        <h3 data-i18n="features.ai.title"></h3>
        <p data-i18n="features.ai.desc"></p>
      </div>
      <div class="grid-item">
        <p class="num">02</p>
        <h3 data-i18n="features.privacy.title"></h3>
        <p data-i18n="features.privacy.desc"></p>
      </div>
      <div class="grid-item">
        <p class="num">03</p>
        <h3 data-i18n="features.icloud.title"></h3>
        <p data-i18n="features.icloud.desc"></p>
      </div>
      <div class="grid-item">
        <p class="num">04</p>
        <h3 data-i18n="features.llm.title"></h3>
        <p data-i18n="features.llm.desc"></p>
      </div>
    </div>
  </section>

  <section class="section">
    <p class="section-eyebrow" data-i18n="privacy.label"></p>
    <h2 class="section-title" data-i18n="privacy.title"></h2>
    <div class="deflist">
      <div class="item">
        <h4 data-i18n="privacy.local.title"></h4>
        <p data-i18n="privacy.local.desc"></p>
      </div>
      <div class="item">
        <h4 data-i18n="privacy.icloud.title"></h4>
        <p data-i18n="privacy.icloud.desc"></p>
      </div>
      <div class="item">
        <h4 data-i18n="privacy.ai.title"></h4>
        <p data-i18n="privacy.ai.desc"></p>
      </div>
      <div class="item">
        <h4 data-i18n="privacy.nodev.title"></h4>
        <p data-i18n="privacy.nodev.desc"></p>
      </div>
    </div>
    <div class="note" data-i18n="privacy.note"></div>
    <div style="margin-top: 32px;">
      <a href="/journal/privacy.html" class="arrow-link">
        <span data-i18n="privacy.readFull"></span>
        <span class="arrow">→</span>
      </a>
    </div>
  </section>

  <section class="cta-band">
    <p class="section-eyebrow" data-i18n="help.label"></p>
    <h2 data-i18n="help.title"></h2>
    <p data-i18n="help.desc"></p>
    <div class="cta-row">
      <a class="btn btn-primary" href="mailto:tera-support@teramoby.com" data-i18n="help.emailBtn"></a>
      <a class="btn btn-outline" href="https://groups.google.com/g/tera-help" target="_blank" rel="noopener" data-i18n="help.groupBtn"></a>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="inner">
    <div class="brand-col">
      <div class="brand"><img src="/icon-64.png" alt=""><span>TeraJournal</span></div>
      <p class="tagline" data-i18n="footer.tagline"></p>
    </div>
    <a class="footer-qr" href="https://apps.apple.com/us/app/terajournal/id6760472493" target="_blank" rel="noopener">
      <img src="/img/qr-journal-appstore.png" alt="App Store QR">
      <span data-i18n="footer.qrCaption"></span>
    </a>
  </div>
  <div class="meta">
    <span data-i18n="footer.copy"></span>
    <nav>
      <a href="/journal/privacy.html" data-i18n="footer.privacy"></a>
    </nav>
  </div>
</footer>

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('terajournal-lang', lang);
  }

  const saved = localStorage.getItem('terajournal-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);
</script>

</body>
</html>
