<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-64.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeraJournal · Privacy Policy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap">
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body class="theme-journal">

<header class="site-header">
  <div class="inner">
    <a href="/journal/" class="brand">
      <img src="/icon-64.png" alt="">
      <span>TeraJournal</span>
    </a>
    <div class="breadcrumb">
      <span class="sep">/</span>
      <span data-i18n="nav.privacy"></span>
    </div>
    <div class="spacer"></div>
    <nav>
      <a href="/journal/" data-i18n="nav.home"></a>
    </nav>
    <div class="lang-toggle">
      <button id="btn-zh" class="active" onclick="setLang('zh')">中文</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<main class="reading">
  <p class="dateline" data-i18n="page.date"></p>
  <h1 data-i18n="hero.title"></h1>
  <p class="lede" data-i18n="hero.subtitle"></p>

  <h2 data-i18n="s.storage.label"></h2>
  <h3 data-i18n="s1.title"></h3>
  <p data-i18n="s1.body"></p>
  <h3 data-i18n="s2.title"></h3>
  <p data-i18n="s2.body"></p>

  <h2 data-i18n="s.icloud.label"></h2>
  <h3 data-i18n="s3.title"></h3>
  <p data-i18n="s3.body"></p>
  <div class="callout" data-i18n="s3.note"></div>

  <h2 data-i18n="s.ai.label"></h2>
  <h3 data-i18n="s4.title"></h3>
  <p data-i18n="s4.body"></p>
  <p data-i18n="s4.body2"></p>
  <div class="callout" data-i18n="s4.note"></div>

  <h2 data-i18n="s.access.label"></h2>
  <h3 data-i18n="s5.title"></h3>
  <p data-i18n="s5.body"></p>
  <h3 data-i18n="s6.title"></h3>
  <p data-i18n="s6.body"></p>

  <h2 data-i18n="s.contact.label"></h2>
  <h3 data-i18n="s7.title"></h3>
  <p data-i18n="s7.body"></p>
  <p style="margin-top: 24px;">
    <a class="btn btn-primary" href="mailto:tera-support@teramoby.com" data-i18n="s7.btn"></a>
  </p>
</main>

<footer class="site-footer">
  <div class="inner">
    <div class="brand-col">
      <div class="brand"><img src="/icon-64.png" alt=""><span>TeraJournal</span></div>
      <p class="tagline" data-i18n="footer.tagline"></p>
    </div>
    <a class="footer-qr" href="https://apps.apple.com/us/app/terajournal/id6760472493" target="_blank" rel="noopener">
      <img src="/img/qr-journal-appstore.png" alt="App Store QR">
      <span data-i18n="footer.qrCaption"></span>
    </a>
  </div>
  <div class="meta">
    <span data-i18n="footer.copy"></span>
    <nav>
      <a href="/journal/" data-i18n="nav.home"></a>
    </nav>
  </div>
</footer>

<script>
  const i18n = {
    zh: {
      "nav.home": "首页",
      "nav.privacy": "隐私政策",
      "hero.title": "隐私政策",
      "hero.subtitle": "TeraJournal 不收集您的任何数据。您的日记只属于您，开发者在技术上无任何途径获取您的内容。",
      "page.date": "生效日期：2026 年 3 月 16 日",
      "s.storage.label": "数据存储",
      "s1.title": "数据本地存储",
      "s1.body": "您在 TeraJournal 中写下的所有日记内容、配置信息及偏好设置，默认仅保存在您所安装的设备上。TeraJournal 没有云端同步服务器，没有远程备份，也没有任何形式的服务器端存储。",
      "s2.title": "零数据收集",
      "s2.body": "TeraJournal 不收集、不记录、不传输任何用户数据，包括：日记内容与历史记录、使用行为与统计、设备信息与标识符，以及任何个人身份信息（PII）。",
      "s.icloud.label": "iCloud 同步",
      "s3.title": "iCloud 同步（可选）",
      "s3.body": "TeraJournal 支持通过 iCloud 在您的多台 Apple 设备间同步日记。此功能默认关闭，由您主动开启。开启后，您的日记数据会上传至您自己的 iCloud 账户，由 Apple 负责存储与管理，TeraJournal 开发者无法访问这些数据。",
      "s3.note": "iCloud 同步由 Apple 提供，您的数据受 Apple 隐私政策约束。如需了解 Apple 如何处理您的 iCloud 数据，请参阅 Apple 隐私政策。",
      "s.ai.label": "AI 功能与数据传输",
      "s4.title": "AI 日记回复数据传输",
      "s4.body": "TeraJournal 的 AI 回复功能需要将您的日记内容发送至您所配置的 LLM 服务商（如 OpenAI、Anthropic、Google Gemini 等），以生成 AI 回复。传输通过您自己提供的 API 密钥直接与服务商建立连接，TeraJournal 不对此内容进行拦截、存储或任何形式的处理。",
      "s4.body2": "此功能默认关闭，需要您主动配置 LLM API 密钥后方可使用。您的日记内容仅用于向所选服务商请求 AI 回复，不作任何其他用途。",
      "s4.note": "各 AI 服务商将依据其自身隐私政策处理收到的数据，与 TeraJournal 无关。建议您在配置前阅读所选服务商的隐私政策。",
      "s.access.label": "数据安全",
      "s5.title": "开发者无法访问您的数据",
      "s5.body": "TeraJournal 不设任何后端服务器、数据管道或遥测系统。即便开发者想获取您的数据，在技术上也无从实现。您的隐私受到架构层面的保护，而非仅依赖于承诺。",
      "s6.title": "API 密钥安全",
      "s6.body": "您配置的 LLM API 密钥仅存储于本地设备的系统安全存储中（如 macOS Keychain 或 iOS Keychain）。这些密钥不会传输给 TeraJournal 开发者，也不会用于任何其他目的。",
      "s.contact.label": "联系我们",
      "s7.title": "对本政策有疑问？",
      "s7.body": "如您对本隐私政策有任何疑问，欢迎发送邮件与我们联系。",
      "s7.btn": "发送邮件",
      "footer.tagline": "A quiet AI companion for your journal. 由 teramoby 开发。",
      "footer.qrCaption": "扫码下载 App Store",
      "footer.copy": "© 2026 teramoby · tera-support@teramoby.com",
    },
    en: {
      "nav.home": "Home",
      "nav.privacy": "Privacy Policy",
      "hero.title": "Privacy Policy",
      "hero.subtitle": "TeraJournal collects none of your data. Your journal belongs only to you, and our developers have no technical means to access your content — ever.",
      "page.date": "Effective Date: March 16, 2026",
      "s.storage.label": "Data Storage",
      "s1.title": "Stored Locally on Your Device",
      "s1.body": "Everything you write in TeraJournal — journal entries, configurations, and preferences — is stored exclusively on your device by default. TeraJournal has no sync servers, no remote backups, and no server-side storage of any kind.",
      "s2.title": "We Collect Zero Data",
      "s2.body": "TeraJournal does not collect, log, or transmit any user data — including journal content and history, usage behavior and analytics, device information and identifiers, or any personally identifiable information (PII).",
      "s.icloud.label": "iCloud Sync",
      "s3.title": "iCloud Sync (Optional)",
      "s3.body": "TeraJournal supports optional iCloud sync to keep your journal in sync across your Apple devices. This feature is off by default and must be explicitly enabled by you. When enabled, your journal data is uploaded to your own iCloud account, stored and managed by Apple. TeraJournal's developers have no access to this data.",
      "s3.note": "iCloud sync is provided by Apple. Your data is subject to Apple's Privacy Policy. Please refer to Apple's Privacy Policy to understand how your iCloud data is handled.",
      "s.ai.label": "AI Features & Data Transmission",
      "s4.title": "AI Reply Data Transmission",
      "s4.body": "TeraJournal's AI reply feature works by sending your journal content to the LLM provider you configure (such as OpenAI, Anthropic, Google Gemini, etc.) in order to generate AI responses. This transmission uses your own API key to connect directly with the provider. TeraJournal does not intercept, store, or process this content in any way.",
      "s4.body2": "This feature is off by default and requires you to actively configure an LLM API key. Your journal content is used solely to request AI replies from your chosen provider and for no other purpose.",
      "s4.note": "Each AI provider processes the data it receives under its own privacy policy, independently of TeraJournal. We recommend reviewing your chosen provider's privacy policy before configuring it.",
      "s.access.label": "Data Security",
      "s5.title": "Developers Cannot Access Your Data",
      "s5.body": "TeraJournal has no backend servers, data pipelines, or telemetry systems. Even if we wanted to access your data, it would be technically impossible. Your privacy is protected at the architectural level — not just by policy.",
      "s6.title": "API Key Security",
      "s6.body": "LLM API keys you configure are stored only in your device's secure system storage (e.g., macOS Keychain or iOS Keychain). They are never transmitted to TeraJournal's developers and are never used for any other purpose.",
      "s.contact.label": "Contact",
      "s7.title": "Questions About This Policy?",
      "s7.body": "If you have any questions about this Privacy Policy, feel free to reach out by email.",
      "s7.btn": "Send Email",
      "footer.tagline": "A quiet AI companion for your journal. Built by teramoby.",
      "footer.qrCaption": "Scan for the App Store",
      "footer.copy": "© 2026 teramoby · tera-support@teramoby.com",
    }
  };

  function setLang(lang) {
    document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    localStorage.setItem('terajournal-lang', lang);
  }

  const saved = localStorage.getItem('terajournal-lang');
  const preferred = saved || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  setLang(preferred);

  window.addEventListener('scroll', () => {
    const h = document.querySelector('.site-header');
    if (h) h.classList.toggle('scrolled', window.scrollY > 4);
  }, { passive: true });
</script>

</body>
</html>
